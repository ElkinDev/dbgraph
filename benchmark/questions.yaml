version: 1
substrate: sqlite-torture
perFamily: 1
n: 5
familiesIncluded:
  - fk-path
  - column-type
  - impact
  - trigger-inventory
  - constraint-semantics
familiesExcluded:
  - view-dependency
notes:
  view-dependency: "held out of the frozen set — N is pinned at 5. The SQLite adapter now derives view depends_on edges from bodies (sqlite-view-deps), so the enumerator yields candidates; instantiating them into the committed set is deferred to its own labeled run."
questions:
  - qid: column-type-assignments.dept_id
    family: column-type
    question: "What is the declared SQL data type and nullability of the column assignments.dept_id?"
    answerFormat: "The declared type and nullability as TYPE|NULLABLE, where NULLABLE is NULL or NOT NULL (e.g. \"VARCHAR|NULL\")."
  - qid: constraint-semantics-assignments
    family: constraint-semantics
    question: "List the columns of the PRIMARY KEY of table assignments, in their declared order."
    answerFormat: "Comma-separated primary-key column names in their DECLARED order — order matters (e.g. \"tenant_id, id\")."
  - qid: fk-path-assignments-employees
    family: fk-path
    question: "What foreign-key join path connects the tables assignments and employees?"
    answerFormat: "Semicolon-separated join atoms fromTable.fromColumn=toTable.toColumn using unqualified table names; order does not matter (e.g. \"orders.cust_id=customers.id; orders.region=customers.region\")."
  - qid: impact-departments
    family: impact
    question: "A developer proposes the following DDL change:\nALTER TABLE main.departments DROP COLUMN dept_id;\nWhich existing database objects should be re-tested as a result of this change?"
    answerFormat: "Comma-separated, alphabetically sorted list of unqualified object names (e.g. \"orders, shipments\")."
  - qid: trigger-inventory-active_departments
    family: trigger-inventory
    question: "Which triggers are defined on active_departments? For each trigger give its name, timing, and the events it fires on."
    answerFormat: "Comma-separated tuples name:timing:events, where events is a |-separated sorted list; tuple order does not matter (e.g. \"trg_x:AFTER:INSERT|UPDATE\")."
