name: CI

on:
  push:
    branches: [main]
  pull_request:
  # workflow_dispatch allows the sqlcmd-transport job to be triggered manually.
  # The job's `if:` condition gates it — on push/pull_request it will be skipped.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['22.x', '24.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Run unit tests (leak-scanner enforces LEAKSCAN_DENYLIST when set)
        run: npm test
        env:
          LEAKSCAN_DENYLIST: ${{ secrets.LEAKSCAN_DENYLIST }}
      - run: npm audit --omit=dev --audit-level=high

  # Gated SQL Server integration job: Linux-only (Docker available), independent
  # of the unit matrix (`needs: []`). Uses an ephemeral Testcontainers instance —
  # never connects to any persistent database. Gate: DBGRAPH_INTEGRATION=1.
  # Does NOT block the unit matrix — failures here do not affect `test`.
  mssql-integration:
    runs-on: ubuntu-latest
    # Independent — does not need `test` to pass first
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - name: Run SQL Server integration tests
        env:
          DBGRAPH_INTEGRATION: '1'
        run: npm run test:integration

  # Gated PostgreSQL integration job: Linux-only (Docker available), independent
  # of the unit matrix (`needs: []`). Uses an ephemeral postgres:16 Testcontainers
  # instance — never connects to any persistent database. Gate: DBGRAPH_INTEGRATION=1.
  # Does NOT block the unit matrix — failures here do not affect `test`.
  pg-integration:
    runs-on: ubuntu-latest
    # Independent — does not need `test` to pass first
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - name: Run PostgreSQL integration tests
        env:
          DBGRAPH_INTEGRATION: '1'
        run: npm run test:integration

  # Gated MySQL integration job: Linux-only (Docker available), independent
  # of the unit matrix (`needs: []`). Uses an ephemeral mysql:8 Testcontainers
  # instance — never connects to any persistent database. Gate: DBGRAPH_INTEGRATION=1.
  # Does NOT block the unit matrix — failures here do not affect `test`.
  mysql-integration:
    runs-on: ubuntu-latest
    # Independent — does not need `test` to pass first
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - name: Run MySQL integration tests
        env:
          DBGRAPH_INTEGRATION: '1'
        run: npm run test:integration

  # Gated MongoDB integration job: Linux-only (Docker available), independent
  # of the unit matrix (`needs: []`). Uses an ephemeral mongo:7 Testcontainers
  # instance — never connects to any persistent database. Gate: DBGRAPH_INTEGRATION=1.
  # Does NOT block the unit matrix — failures here do not affect `test`.
  mongodb-integration:
    runs-on: ubuntu-latest
    # Independent — does not need `test` to pass first
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - name: Run MongoDB integration tests
        env:
          DBGRAPH_INTEGRATION: '1'
        run: npm run test:integration

  # OPT-IN sqlcmd transport lane (US-044, Batch 6).
  # PURPOSE: exercises the sqlcmd flag combinations, chunked FOR JSON output, and
  #          encoding path (F-3/F-4/F-5/F-6 coverage gap F-7) that are NOT exercised
  #          by the tedious/Testcontainers unit matrix.
  #
  # GATE RULES (MUST hold invariant):
  #   - This job is NEVER listed in `needs:` by the unit matrix `test` job.
  #   - It is ONLY triggered via workflow_dispatch (explicit opt-in) OR when the
  #     DBGRAPH_SQLCMD_LANE secret/variable is set to '1'.
  #   - On ANY sqlcmd install failure the step emits a notice and exits 0
  #     (skip-with-notice) — the job NEVER turns the matrix red.
  #   - The unit `test` job has no dependency on this job; PR status checks
  #     MUST NOT require this job.
  #
  # How to trigger:
  #   Actions → CI → Run workflow → (choose branch) → Trigger
  #   OR set repository variable DBGRAPH_SQLCMD_LANE=1 in repo settings.
  sqlcmd-transport:
    runs-on: ubuntu-latest
    # OPT-IN: only runs on explicit workflow_dispatch trigger.
    # The `test` job does NOT list this in needs: — unit matrix is independent.
    if: github.event_name == 'workflow_dispatch' || vars.DBGRAPH_SQLCMD_LANE == '1'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci

      # Install a pinned sqlcmd version.
      # On install failure: emit a notice and exit 0 (skip-with-notice — mirrors L-003).
      # This step MUST NOT exit non-zero on install failure.
      - name: Install sqlcmd (pinned; skip-with-notice on failure)
        id: install_sqlcmd
        run: |
          set +e
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          curl -fsSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list > /dev/null
          sudo apt-get update -qq
          ACCEPT_EULA=Y sudo apt-get install -y mssql-tools18 unixodbc-dev 2>/dev/null
          INSTALL_EXIT=$?
          set -e
          if [ $INSTALL_EXIT -ne 0 ]; then
            echo "::notice::sqlcmd install failed (exit $INSTALL_EXIT) — skipping sqlcmd transport lane (F-7). This does NOT block the unit matrix."
            echo "sqlcmd_available=false" >> "$GITHUB_OUTPUT"
          else
            echo "sqlcmd_available=true" >> "$GITHUB_OUTPUT"
            echo "sqlcmd installed:"
            /opt/mssql-tools18/bin/sqlcmd -? 2>&1 | head -3 || true
          fi

      # Run only the sqlcmd-transport subset of tests.
      # These are the flag-combo / chunking / encoding tests (US-042/044) that
      # require sqlcmd to be present. Guard: skip if install failed.
      - name: Run sqlcmd transport tests (flag combos, chunking, encoding)
        if: steps.install_sqlcmd.outputs.sqlcmd_available == 'true'
        env:
          DBGRAPH_SQLCMD_LANE: '1'
          SQLCMD_PATH: '/opt/mssql-tools18/bin/sqlcmd'
        run: |
          npm test -- --reporter=verbose \
            "test/adapters/engines/mssql/strategies/json-rows-reassembly" \
            "test/adapters/engines/mssql/strategies/profiles" \
            "test/adapters/engines/mssql/probe" \
            "test/fixtures/mssql/connectivity"

      - name: Skip notice (sqlcmd unavailable)
        if: steps.install_sqlcmd.outputs.sqlcmd_available != 'true'
        run: |
          echo "::notice::sqlcmd transport lane skipped — sqlcmd not available. Unit matrix unaffected."
